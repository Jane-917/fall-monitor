<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>跌倒監控系統</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 30px;
}

.alert {
  color: red;
  font-size: 30px;
  font-weight: bold;
}

.ok {
  color: green;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>👴 長者跌倒監控系統</h1>

<div id="status" class="ok">等待資料...</div>

<div id="location">位置：--</div>

<br>

<button onclick="openMap()">📍 開啟地圖</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 改成你的 Firebase
var firebaseConfig = {
 databaseURL: "https://fall-detect-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();


// 🔴 監聽跌倒
db.ref("user1/alert").on("value", function(snapshot) {
    let val = snapshot.val();

    if(val == "fall detected"){
        document.getElementById("status").innerHTML = "🚨 發生跌倒！";
        document.getElementById("status").className = "alert";
    } else {
        document.getElementById("status").innerHTML = "正常";
        document.getElementById("status").className = "ok";
    }
});


// 📍 監聽GPS
db.ref("user1/location").on("value", function(snapshot) {
    let val = snapshot.val();
    document.getElementById("location").innerHTML = "位置：" + val;
});


// 🗺️ 開地圖
function openMap(){
    let loc = document.getElementById("location").innerText.replace("位置：","");
    window.open("https://www.google.com/maps?q=" + loc);
}

</script>

</body>
</html>
