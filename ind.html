<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>智慧長者跌倒監控系統</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
}

.header{
    background:#1976d2;
    color:white;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.card{
    background:white;
    margin:20px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.status-safe{
    color:green;
    font-size:28px;
    font-weight:bold;
}

.status-danger{
    color:red;
    font-size:32px;
    font-weight:bold;
    animation:flash 1s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}

.location{
    font-size:20px;
    margin-top:15px;
}

button{
    border:none;
    padding:15px 25px;
    margin:10px;
    border-radius:15px;
    font-size:20px;
    cursor:pointer;
}

.alert-btn{
    background:red;
    color:white;
}

.safe-btn{
    background:green;
    color:white;
}

.map-btn{
    background:#1976d2;
    color:white;
}

.footer{
    margin-top:30px;
    color:gray;
}

</style>
</head>

<body>

<div class="header">
👴 智慧長者跌倒監控系統
</div>

<div class="card">

<div id="status" class="status-safe">
✅ 目前安全
</div>

<div id="location" class="location">
📍 位置：讀取中...
</div>

</div>

<div class="card">

<button class="alert-btn" onclick="sendAlert()">
🚨 模擬跌倒
</button>

<button class="safe-btn" onclick="clearAlert()">
✅ 解除警報
</button>

<button class="map-btn" onclick="openMap()">
🗺️ 開啟地圖
</button>

</div>

<div class="footer">
Firebase 即時監控系統
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 換成你的 Firebase URL
var firebaseConfig = {

    databaseURL: "https://fall-detect-default-rtdb.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();


// 📍 取得 iPhone GPS
navigator.geolocation.getCurrentPosition(function(position){

    let lat = position.coords.latitude;
    let lng = position.coords.longitude;

    let loc = lat + "," + lng;

    db.ref("user1/location").set(loc);

});


// 🚨 發送跌倒警報
function sendAlert(){

    db.ref("user1/alert").set("fall detected");

    alert("已送出跌倒警報！");

}


// ✅ 解除警報
function clearAlert(){

    db.ref("user1/alert").set("safe");

}


// 🔴 即時監聽警報
db.ref("user1/alert").on("value", function(snapshot){

    let val = snapshot.val();

    if(val == "fall detected"){

        document.getElementById("status").innerHTML =
        "🚨 偵測到跌倒！";

        document.getElementById("status").className =
        "status-danger";

    }else{

        document.getElementById("status").innerHTML =
        "✅ 目前安全";

        document.getElementById("status").className =
        "status-safe";

    }

});


// 📍 即時監聽 GPS
db.ref("user1/location").on("value", function(snapshot){

    let val = snapshot.val();

    document.getElementById("location").innerHTML =
    "📍 位置：" + val;

});


// 🗺️ Google Maps
function openMap(){

    let text =
    document.getElementById("location").innerText;

    let loc = text.replace("📍 位置：","");

    window.open(
        "https://www.google.com/maps?q=" + loc
    );

}

</script>

</body>
</html>
